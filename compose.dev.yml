services:
  app:
    build: .
    command:
      ["uv", "run", "python", "app/manage.py", "runserver", "0.0.0.0:8000"]
    container_name: app_dev
    ports:
      - "8000:8000"
    restart: "unless-stopped"
    env_file:
      - .env
    volumes:
      - ./app:/code/app
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: db_dev
    restart: "unless-stopped"
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql

volumes:
  mysql_data_dev:
