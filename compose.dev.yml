services:
  app:
    build: .
    command:
      ["uv", "run", "python", "app/manage.py", "runserver", "0.0.0.0:8000"]
    container_name: app_dev
    ports:
      - "8000:8000"
    restart: "unless-stopped"
    env_file:
      - .env
    volumes:
      - ./app:/code/app
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: db_dev
    restart: "unless-stopped"
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

volumes:
  pgdata_dev:
