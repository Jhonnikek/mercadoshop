name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & Release Android App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./androidapp

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          touch .env
          echo "BASE_URL=${{ secrets.BASE_URL }}" > .env

      - name: Build APK
        run: flutter build apk --release

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Rename build files
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/mercadoshop.apk
          mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/mercadoshop.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: androidapp/build/app/outputs/flutter-apk/mercadoshop.apk

      - name: Upload AppBundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: androidapp/build/app/outputs/bundle/release/mercadoshop.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            androidapp/build/app/outputs/flutter-apk/mercadoshop.apk
            androidapp/build/app/outputs/bundle/release/mercadoshop.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
