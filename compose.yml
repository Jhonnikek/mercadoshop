services:
  app:
    image: ghcr.io/jhonnikek/mercadoshop:latest
    container_name: app
    restart: always
    ports:
      - "80:80"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: db
    restart: always
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
