services:
  app:
    image: ghcr.io/jhonnikek/mercadoshop:latest
    container_name: app
    restart: always
    ports:
      - "80:80"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: db
    restart: always
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
